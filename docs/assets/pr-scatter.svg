<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="pr-title pr-desc">
  <title id="pr-title">Precision-Recall scatter by entity type</title>
  <desc id="pr-desc">Regex detectors cluster at perfect precision and recall. NER PERSON and LOCATION score well. STREET_ADDRESS has perfect precision but low recall. ORGANIZATION has high recall but very low precision — 3 in 4 detections are false positives.</desc>

  <defs>
    <linearGradient id="pr-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <style>
      .pr-title  { font: 800 22px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .pr-sub    { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #475569; }
      .pr-axis   { font: 700 12px Inter, Segoe UI, Arial, sans-serif; fill: #64748b; }
      .pr-tick   { font: 500 11px Inter, Segoe UI, Arial, sans-serif; fill: #94a3b8; }
      .pr-label  { font: 700 12px Inter, Segoe UI, Arial, sans-serif; }
      .pr-f1     { font: 600 11px Inter, Segoe UI, Arial, sans-serif; fill: #94a3b8; }
      .pr-legend { font: 600 13px Inter, Segoe UI, Arial, sans-serif; fill: #334155; }
      .grid      { stroke: #e2e8f0; stroke-width: 1; }
      .f1-curve  { stroke: #cbd5e1; stroke-width: 1.2; stroke-dasharray: 5,4; fill: none; }
    </style>
  </defs>

  <!-- background -->
  <rect width="900" height="520" rx="24" fill="url(#pr-bg)"/>

  <!-- title -->
  <text x="50" y="46" class="pr-title">Precision vs. Recall by Entity Type</text>
  <text x="50" y="70" class="pr-sub">Each point is one entity type. Top-right is ideal. ORGANIZATION sits bottom-right: high recall, very low precision.</text>

  <!-- plot area: x 120–800 (680px), y 95–435 (340px) -->
  <!-- x = 120 + recall*680  |  y = 435 - precision*340 -->

  <!-- plot border -->
  <rect x="120" y="95" width="680" height="340" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- grid lines at 0.25 intervals -->
  <!-- vertical (recall) -->
  <line x1="290" y1="95"  x2="290" y2="435" class="grid"/>
  <line x1="460" y1="95"  x2="460" y2="435" class="grid"/>
  <line x1="630" y1="95"  x2="630" y2="435" class="grid"/>
  <!-- horizontal (precision) -->
  <line x1="120" y1="350" x2="800" y2="350" class="grid"/>
  <line x1="120" y1="265" x2="800" y2="265" class="grid"/>
  <line x1="120" y1="180" x2="800" y2="180" class="grid"/>

  <!-- axis ticks -->
  <text x="114" y="439" class="pr-tick" text-anchor="end">0.0</text>
  <text x="284" y="439" class="pr-tick" text-anchor="end">0.25</text>
  <text x="454" y="439" class="pr-tick" text-anchor="end">0.50</text>
  <text x="624" y="439" class="pr-tick" text-anchor="end">0.75</text>
  <text x="804" y="439" class="pr-tick" text-anchor="end">1.00</text>

  <text x="112" y="439" class="pr-tick" text-anchor="end">0.00</text>
  <text x="112" y="354" class="pr-tick" text-anchor="end">0.25</text>
  <text x="112" y="269" class="pr-tick" text-anchor="end">0.50</text>
  <text x="112" y="184" class="pr-tick" text-anchor="end">0.75</text>
  <text x="112" y="99"  class="pr-tick" text-anchor="end">1.00</text>

  <!-- axis labels -->
  <text x="460" y="472" class="pr-axis" text-anchor="middle">Recall</text>
  <text x="30"  y="265" class="pr-axis" text-anchor="middle" transform="rotate(-90,30,265)">Precision</text>

  <!-- iso-F1 curves (dashed) -->
  <!-- F1 = 0.5: P = 0.5R/(2R-0.5), starts at R=0.333 (where P=1) -->
  <polyline class="f1-curve" points="
    346,95
    375,180
    460,265
    545,295
    630,307
    800,327
  "/>
  <text x="348" y="92" class="pr-f1" text-anchor="middle">F1=0.5</text>

  <!-- F1 = 0.7: P = 0.7R/(2R-0.7), starts at R=0.538 (where P=1) -->
  <polyline class="f1-curve" points="
    486,95
    511,131
    578,181
    663,215
    800,242
  "/>
  <text x="490" y="92" class="pr-f1" text-anchor="middle">F1=0.7</text>

  <!-- F1 = 0.9: P = 0.9R/(2R-0.9), starts at R=0.818 (where P=1) -->
  <polyline class="f1-curve" points="
    676,95
    697,108
    732,129
    766,146
    800,159
  "/>
  <text x="680" y="92" class="pr-f1" text-anchor="middle">F1=0.9</text>

  <!--
    Data points:
    SSN, EMAIL, PHONE, CC, IP, DOB — regex, R=1.0, P=1.0 → (800, 95)
    PERSON      — NER,   R=0.875, P=0.808 → (120+0.875*680=715, 435-0.808*340=160)
    LOCATION    — NER,   R=0.909, P=0.833 → (120+0.909*680=738, 435-0.833*340=152)
    STREET_ADDR — regex, R=0.200, P=1.000 → (120+0.2*680=256,  435-1.0*340=95)
    ORGANIZATION— NER,   R=0.833, P=0.227 → (120+0.833*680=686, 435-0.227*340=358)
  -->

  <!-- Regex perfect cluster (SSN / EMAIL / PHONE / CC / IP / DOB) -->
  <circle cx="800" cy="95" r="12" fill="#0f766e" opacity="0.9"/>
  <text x="784" y="88" class="pr-label" fill="#0f766e" text-anchor="end">SSN · EMAIL · PHONE</text>
  <text x="784" y="76" class="pr-label" fill="#0f766e" text-anchor="end">CC · IP · DOB</text>

  <!-- STREET_ADDRESS — regex, high precision, low recall -->
  <circle cx="256" cy="95" r="9" fill="#0f766e" opacity="0.85"/>
  <text x="264" y="90" class="pr-label" fill="#0f766e">STREET_ADDRESS</text>
  <text x="264" y="104" class="pr-label" fill="#475569" font-weight="400" font-size="11">P=1.00  R=0.20</text>

  <!-- PERSON — NER -->
  <circle cx="715" cy="160" r="9" fill="#9333ea" opacity="0.85"/>
  <text x="705" y="155" class="pr-label" fill="#9333ea" text-anchor="end">PERSON</text>
  <text x="705" y="169" class="pr-label" fill="#475569" font-weight="400" font-size="11" text-anchor="end">P=0.81  R=0.88</text>

  <!-- LOCATION — NER -->
  <circle cx="738" cy="152" r="9" fill="#9333ea" opacity="0.85"/>
  <text x="748" y="148" class="pr-label" fill="#9333ea">LOCATION</text>
  <text x="748" y="162" class="pr-label" fill="#475569" font-weight="400" font-size="11">P=0.83  R=0.91</text>

  <!-- ORGANIZATION — NER, problem entity, highlighted red -->
  <circle cx="686" cy="358" r="11" fill="#dc2626" opacity="0.9"/>
  <text x="696" y="354" class="pr-label" fill="#dc2626">ORGANIZATION</text>
  <text x="696" y="368" class="pr-label" fill="#475569" font-weight="400" font-size="11">P=0.23  R=0.83</text>
  <!-- annotation arrow -->
  <line x1="686" y1="369" x2="686" y2="400" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="3,3"/>
  <text x="686" y="416" class="pr-f1" fill="#dc2626" text-anchor="middle">3 in 4 detections</text>
  <text x="686" y="430" class="pr-f1" fill="#dc2626" text-anchor="middle">are false positives</text>

  <!-- legend -->
  <circle cx="122" cy="480" r="7" fill="#0f766e"/>
  <text x="136" y="485" class="pr-legend">Regex detector</text>
  <circle cx="270" cy="480" r="7" fill="#9333ea"/>
  <text x="284" y="485" class="pr-legend">spaCy NER</text>
  <circle cx="390" cy="480" r="7" fill="#dc2626"/>
  <text x="404" y="485" class="pr-legend">NER — excluded from production recommendation</text>
</svg>
