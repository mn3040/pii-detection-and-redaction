<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="420" viewBox="0 0 1120 420" role="img" aria-labelledby="title desc">
  <title id="title">Evaluation summary</title>
  <desc id="desc">Combined regex and NER reaches 0.907 recall and 0.721 F1; regex only has perfect precision but lower recall; NER only is weaker on both.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <style>
      .title { font: 800 30px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .body { font: 500 16px Inter, Segoe UI, Arial, sans-serif; fill: #475569; }
      .axis { font: 700 13px Inter, Segoe UI, Arial, sans-serif; fill: #64748b; letter-spacing: .05em; }
      .label { font: 700 17px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .metric { font: 800 18px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .grid { stroke: #d8e0ee; stroke-width: 1; }
      .bar-bg { fill: #e2e8f0; rx: 8; }
      .combined { fill: #2563eb; rx: 8; }
      .regex { fill: #0f766e; rx: 8; }
      .ner { fill: #9333ea; rx: 8; }
      .card { fill: #ffffff; stroke: #dbe3ef; stroke-width: 1.5; rx: 20; }
    </style>
  </defs>
  <rect width="1120" height="420" rx="28" fill="url(#bg)"/>
  <text x="54" y="62" class="title">Evaluation Snapshot</text>
  <text x="54" y="94" class="body">Regex is high precision. NER adds recall. The combined system exposes the tradeoff instead of hiding it.</text>

  <rect x="54" y="130" width="1012" height="238" class="card"/>
  <line x1="300" y1="328" x2="1010" y2="328" class="grid"/>
  <text x="300" y="351" class="axis">0.0</text>
  <text x="647" y="351" class="axis">0.5</text>
  <text x="995" y="351" class="axis">1.0</text>

  <text x="90" y="184" class="label">Combined</text>
  <rect x="300" y="160" width="710" height="22" class="bar-bg"/>
  <rect x="300" y="160" width="425" height="22" class="combined"/>
  <rect x="300" y="190" width="710" height="22" class="bar-bg"/>
  <rect x="300" y="190" width="644" height="22" class="combined"/>
  <rect x="300" y="220" width="710" height="22" class="bar-bg"/>
  <rect x="300" y="220" width="512" height="22" class="combined"/>
  <text x="835" y="178" class="metric">P 0.599</text>
  <text x="835" y="208" class="metric">R 0.907</text>
  <text x="835" y="238" class="metric">F1 0.721</text>

  <text x="90" y="286" class="label">Regex only</text>
  <rect x="300" y="262" width="710" height="22" class="bar-bg"/>
  <rect x="300" y="262" width="710" height="22" class="regex"/>
  <rect x="300" y="292" width="710" height="22" class="bar-bg"/>
  <rect x="300" y="292" width="381" height="22" class="regex"/>
  <text x="835" y="280" class="metric">P 1.000</text>
  <text x="835" y="310" class="metric">R 0.536</text>

  <circle cx="96" cy="385" r="7" fill="#2563eb"/>
  <text x="112" y="390" class="body">Combined regex + NER</text>
  <circle cx="324" cy="385" r="7" fill="#0f766e"/>
  <text x="340" y="390" class="body">Regex only</text>
  <circle cx="508" cy="385" r="7" fill="#9333ea"/>
  <text x="524" y="390" class="body">NER only: P 0.379, R 0.371, F1 0.375</text>
</svg>
